resolver 127.0.0.11 valid=10s ipv6=off;

upstream backend_api {
    zone backend_api 64k;
    least_conn;
    server app:8080 resolve;
}

upstream frontend_web {
    zone frontend_web 64k;
    least_conn;
    server frontend:80 resolve;
}

server {
    listen 80;
    server_name _;

    # API requests go to Spring Boot backend.
    location /api/ {
        proxy_pass http://backend_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single health route in Spanish style.
    location = /actuador {
        return 301 /actuador/;
    }

    location /actuador/ {
        proxy_pass http://backend_api/actuator/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else goes to Angular frontend.
    location / {
        proxy_pass http://frontend_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

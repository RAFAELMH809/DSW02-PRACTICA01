services:
  proxy:
    image: nginx:1.27-alpine
    container_name: empleados-proxy
    restart: unless-stopped
    depends_on:
      - app
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/empleados_db
      SPRING_DATASOURCE_USERNAME: empleados_user
      SPRING_DATASOURCE_PASSWORD: empleados_pass
      APP_SECURITY_USERNAME: admin
      APP_SECURITY_PASSWORD: admin123
    expose:
      - "8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - app
    expose:
      - "80"

  postgres:
    image: postgres:16
    container_name: empleados-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: empleados_db
      POSTGRES_USER: empleados_user
      POSTGRES_PASSWORD: empleados_pass
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empleados_user -d empleados_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

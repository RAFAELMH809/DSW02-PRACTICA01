name: 01 CI

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: empleados_db
          POSTGRES_USER: empleados_user
          POSTGRES_PASSWORD: empleados_pass
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U empleados_user -d empleados_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - run: mvn -B test

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx ng test --watch=false --coverage --coverage-reporters=lcovonly

  dispatch-sonar:
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - test-frontend
    if: ${{ success() }}
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'chain-sonar',
              client_payload: {
                sha: context.sha,
                branch: context.ref.replace('refs/heads/', '')
              }
            });

name: 01-CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: empleados_db
          POSTGRES_USER: empleados_user
          POSTGRES_PASSWORD: empleados_pass
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U empleados_user -d empleados_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - run: mvn -B test

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx ng test --watch=false --coverage --coverage-reporters=lcovonly

      - name: Run Cypress E2E (start server + tests)
        uses: cypress-io/github-action@v5
        with:
          working-directory: frontend
          start: npx ng serve --proxy-config proxy.conf.json --port 8088
          wait-on: 'http://localhost:8088'
          wait-on-timeout: 120000
          command: npx cypress run --spec cypress/e2e/auth/login-crud-empleados.localhost8088.cy.ts --config baseUrl=http://localhost:8088

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore
name: CI 01

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: empleados_db
          POSTGRES_USER: empleados_user
          POSTGRES_PASSWORD: empleados_pass
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U empleados_user -d empleados_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - run: mvn -B test

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx ng test --watch=false

      - name: Start frontend on port 8088
        run: npx ng serve --proxy-config proxy.conf.json --port 8088 > /tmp/ng-serve.log 2>&1 &

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8088 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not start in time"
          cat /tmp/ng-serve.log
          exit 1

      - name: Run Cypress E2E (frontend only)
        run: npx cypress run --spec "cypress/e2e/auth/login-crud-empleados.localhost8088.cy.ts" --config baseUrl=http://localhost:8088

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore
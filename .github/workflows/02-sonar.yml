name: 02 Sonar

on:
  repository_dispatch:
    types:
      - chain-sonar

permissions:
  contents: write

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.client_payload.branch == 'develop' }}

    steps:
      - name: Descargar el codigo (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.client_payload.sha }}

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm ci

      - name: Ejecutar tests frontend con cobertura
        working-directory: frontend
        env:
          CI: true
        run: npx ng test --watch=false --coverage --coverage-reporters=lcovonly

      - name: Compilar backend para generar binarios Java
        run: mvn -B --no-transfer-progress -DskipTests compile

      - name: Ejecutar SonarCloud Scanner
        uses: SonarSource/sonarcloud-github-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Validar compuerta de calidad (Quality Gate)
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Disparar 03 Cypress
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'chain-cypress',
              client_payload: {
                sha: context.payload.client_payload.sha,
                branch: context.payload.client_payload.branch
              }
            });

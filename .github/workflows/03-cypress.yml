name: 03 Cypress

on:
  workflow_run:
    workflows:
      - "02 Sonar"
    types:
      - completed
    branches:
      - develop
  workflow_dispatch:

jobs:
  cypress-e2e:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Run Cypress E2E (start server + tests)
        uses: cypress-io/github-action@v5
        with:
          working-directory: frontend
          start: npx ng serve --proxy-config proxy.conf.json --port 8088
          wait-on: 'http://localhost:8088'
          wait-on-timeout: 120000
          command: npx cypress run --spec cypress/e2e/auth/login-crud-empleados.localhost8088.cy.ts --config baseUrl=http://localhost:8088

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore

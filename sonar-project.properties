sonar.projectKey=RAFAELMH809_DSW02-PRACTICA01
sonar.organization=rafaelmh809
# sources: application code only
sonar.sources=src/main/java,frontend/src/app

# tests: Java unit tests only; frontend unit specs are included via test.inclusions
sonar.tests=src/test/java
sonar.test.inclusions=frontend/src/**/*.spec.ts

sonar.java.binaries=target/classes
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,frontend/coverage/frontend/lcov.info

# Exclude static files and index.html from indexing to avoid double-index issues
sonar.exclusions=frontend/node_modules/**,frontend/dist/**,frontend/.angular/**,frontend/coverage/**,frontend/src/assets/**,frontend/src/index.html
sonar.coverage.exclusions=frontend/src/main.ts,frontend/src/index.html,frontend/src/environments/**
